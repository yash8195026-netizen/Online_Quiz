<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
       xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <title>Profile</title>
    <link rel="stylesheet" th:href="@{/css/dashboard.css}">
</head>
<body>

    <!-- Navbar -->     
<nav class="navbar">
    <div class="logo">Online Quiz</div>
    <div class="nav-right">

    <div class="topdiv">
        <a class="topmenu" th:href="@{/home}">Home</a>
        <a class="topmenu" th:href="@{/quiz}">Quiz</a>
        <a class="topmenu" th:href="@{/quizList}" sec:authorize="hasRole('ADMIN')">Manage Quiz </a>
        <a th:href="@{/profile}" class="topmenu username">Welcome,<span th:text="${#authentication.name}"></span></a>
    </div>

        <form th:action="@{/logout}" method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
            <button type="submit" class="logout-btn"> Logout </button>
        </form>
    </div>
</nav>

<div class="profile-container">
    <div class="profile-card">
        <h2>My Profile</h2>

        <div class="profile-image">
            <img th:if="${user.profilePicture != null}" th:src="@{'/uploads/' + ${user.profilePicture}}" width="150" height="150">
            <img th:if="${user.profilePicture == null}" th:src="@{/images/default-user.jpg}">
        </div>

        <div class="profile-info">
            <p><strong>Username:</strong><span th:text="${user.username}"></span></p>
            <p><strong>Email:</strong><span th:text="${user.email}"></span></p>
            <p><strong>Role:</strong><span th:text="${user.role}"></span></p>
        </div>

        <div class="result-actions">
            <a th:href="@{/editProfile}"class="home-btn">Edit Profile</a>
            <a th:href="@{/changePassword}"class="home-btn">Change Password</a>
        </div>

    </div>
</div>

</body>
</html>
