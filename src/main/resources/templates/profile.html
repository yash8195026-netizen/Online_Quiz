<!DOCTYPE html>

<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
    <title>Profile</title>

<!-- Dark Mode -->
<script>
    if (localStorage.getItem("theme") === "dark") {
        document.documentElement.classList.add("dark-mode");
    }
</script>

<link rel="stylesheet" th:href="@{/css/base.css}">
<link rel="stylesheet" th:href="@{/css/navbar.css}">
<link rel="stylesheet" th:href="@{/css/forms.css}">
<link rel="stylesheet" th:href="@{/css/profile.css}">
<link rel="stylesheet" th:href="@{/css/darkmode.css}">

</head>

<body>

<!-- ================= NAVBAR ================= -->
<div th:replace="~{fragments/navbar :: navbar}"></div>

<!-- ================= PROFILE SECTION ================= -->
<div class="profile-container">

    <div class="profile-card">

        <h2>My Profile</h2>

        <!-- ================= PROFILE HEADER ================= -->
        <div class="profile-header">

            <div class="profile-image">

                <!-- User Uploaded Picture -->
                <img th:if="${user.profilePicture != null}"
                     th:src="@{'/uploads/' + ${user.profilePicture}}"
                     alt="Profile Picture">

                <!-- Default Picture -->
                <img th:if="${user.profilePicture == null}"
                     th:src="@{/images/default-user.jpg}"
                     alt="Default Profile Picture">

            </div>

            <h3 th:text="${user.username}"></h3>

            <span class="role-badge"
                  th:text="${user.role}">
            </span>

        </div>

        <!-- ================= PROFILE INFORMATION ================= -->
        <div class="profile-info">

            <div class="info-card">

                <span class="label">Username</span>

                <span th:text="${user.username}"></span>

            </div>

            <div class="info-card">

                <span class="label">Email</span>

                <span th:text="${user.email}"></span>

            </div>

            <div class="info-card">

                <span class="label">Role</span>

                <span th:text="${user.role}"></span>

            </div>

        </div>

        <!-- ================= ACTION BUTTONS ================= -->
        <div class="profile-actions">

            <a th:href="@{/changeUsername}"
               class="home-btn">
                Change Username
            </a>

            <a th:href="@{/changePassword}"
               class="home-btn">
                Change Password
            </a>

            <a th:href="@{/changeProfilePicture}"
               class="home-btn">
                Change Profile Picture
            </a>

            <a th:href="@{/changeEmail}"
               class="home-btn">
                Change Email
            </a>

        </div>

    </div>

</div>

<!-- Theme Script -->
<script th:src="@{/js/theme.js}"></script>

</body>
</html>
