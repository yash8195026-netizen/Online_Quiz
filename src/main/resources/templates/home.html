<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>

    <title>Home</title>

    <!-- Load saved theme before page renders -->
    <script>
        if (localStorage.getItem("theme") === "dark") {
            document.documentElement.classList.add("dark-mode");
        }
    </script>

    <link rel="stylesheet" th:href="@{/css/base.css}">
    <link rel="stylesheet" th:href="@{/css/navbar.css}">
    <link rel="stylesheet" th:href="@{/css/forms.css}">
    <link rel="stylesheet" th:href="@{/css/darkmode.css}">
    <link rel="stylesheet" th:href="@{/css/home.css}">
    <link rel="stylesheet" th:href="@{/css/mobile.css}">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

</head>

<body>

    <!-- ================= NAVBAR ================= -->
    <div th:replace="~{fragments/navbar :: navbar}"></div>

    <!-- ================= HOME PAGE ================= -->
    <div class="dashboard-container">

        <div class="form-container">

            <h2>Welcome to Online Quiz</h2>

            <p class="dashboard-subtitle">
                Test your knowledge and challenge yourself with exciting quiz questions.
            </p>

            <!-- Category Cards -->
            <div class="card-grid">

                <a th:each="cat : ${categories}"
                   th:href="@{/quiz/{category}(category=${cat.name})}"
                   class="dashboard-card">

                    <h3 th:text="${cat.name + ' Quiz'}"></h3>

                    <p>
                        Test your knowledge in
                        <span th:text="${cat.name}"></span>
                    </p>

                    <!-- Available -->
                    <div class="attempt-status"
                         th:if="${availability != null and availability[cat.name]}">

                        ✅ Available Now

                    </div>

                    <!-- Locked -->
                    <div class="attempt-status locked"
                         th:if="${availability != null and !availability[cat.name]}">

                        🔒 Locked Now

                    </div>

                </a>

            </div>

        </div>

    </div>

    <!-- Error Alert -->
    <script th:if="${error}">
        alert('[[${error}]]');
    </script>

    <!-- Theme Toggle Script -->
    <script th:src="@{/js/theme.js}"></script>

</body>

</html>
