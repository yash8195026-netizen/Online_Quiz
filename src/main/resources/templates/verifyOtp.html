<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Verify OTP</title>

    <!-- Authentication Styles -->
    <link rel="stylesheet" th:href="@{/css/auth.css}">
    <link rel="stylesheet" th:href="@{/css/base.css}">
    <link rel="stylesheet" th:href="@{/css/forms.css}">
    <link rel="stylesheet" th:href="@{/css/darkmode.css}">
    <link rel="stylesheet" th:href="@{/css/mobile.css}">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

</head>

<body>

    <!-- ================= NAVBAR ================= -->
    <nav class="navbar">
        <div class="logo">Online Quiz</div>
    </nav>

    <!-- ================= OTP CONTAINER ================= -->
    <div class="container">

        <h2>Verify OTP</h2>

        <!-- Error Message -->
        <div th:if="${error}" class="error">
            <span th:text="${error}"></span>
        </div>

        <!-- Success Message -->
        <div th:if="${success}" class="success">
            <span th:text="${success}"></span>
        </div>

        <!-- OTP Timer -->
        <div class="otp-timer">
            OTP expires in:
            <span id="otpTimer"></span>
        </div>

        <!-- Verify OTP Form -->
        <form th:action="@{/verifyOtp}" method="post">

            <input type="hidden"
                   th:name="${_csrf.parameterName}"
                   th:value="${_csrf.token}">

            <input type="text"
                   name="otp"
                   placeholder="Enter OTP"
                   required>

            <button type="submit">
                Verify OTP
            </button>

        </form>

        <br>

        <!-- Resend OTP -->
        <form th:action="@{/resendOtp}" method="post">

            <input type="hidden"
                   th:name="${_csrf.parameterName}"
                   th:value="${_csrf.token}">

            <button type="submit">
                Resend OTP
            </button>

        </form>

    </div>

    <!-- ================= OTP TIMER SCRIPT ================= -->
    <script th:inline="javascript">

        let timeLeft = /*[[${remainingTime}]]*/ 300;

        function startOtpTimer() {

            const timer = setInterval(() => {
                const minutes = Math.floor(timeLeft / 60);
                const seconds = timeLeft % 60;

                document.getElementById("otpTimer").textContent =
                        minutes + ":" + (seconds < 10 ? "0" : "") + seconds;

                if (timeLeft <= 0) {
                    clearInterval(timer);
                    // Refresh page when OTP expires
                    location.reload();
                    return;
                }
                timeLeft--;
            }, 1000);
        }
        startOtpTimer();

    </script>

</body>

</html>
