<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Reset Password</title>

    <!-- Authentication Styles -->
    <link rel="stylesheet" th:href="@{/css/auth.css}">
    <link rel="stylesheet" th:href="@{/css/mobile.css}">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- OTP Timer Script -->
    <script th:inline="javascript">
        let timeLeft = /*[[${remainingTime}]]*/ 300;

        function startOtpTimer() {

            const timer = setInterval(function () {

                const minutes = Math.floor(timeLeft / 60);
                const seconds = timeLeft % 60;

                document.getElementById("otpTimer").innerText =
                    minutes + ":" + (seconds < 10 ? "0" : "") + seconds;

                if (timeLeft <= 0) {

                    clearInterval(timer);

                    alert("OTP Expired");

                    window.location.href = "/forgotPassword";

                    return;
                }

                timeLeft--;

            }, 1000);
        }

        window.onload = startOtpTimer;
    </script>

</head>

<body>

    <!-- ================= NAVBAR ================= -->
    <nav class="navbar">
        <div class="logo">Online Quiz</div>
    </nav>

    <!-- ================= RESET PASSWORD ================= -->
    <div class="container">

        <h2>Reset Password</h2>

        <!-- Error Message -->
        <div th:if="${error}" class="error">
            <span th:text="${error}"></span>
        </div>

        <!-- OTP Countdown -->
        <div class="otp-timer">
            OTP expires in:
            <span id="otpTimer"></span>
        </div>

        <!-- Reset Password Form -->
        <form th:action="@{/resetPassword}" method="post">

            <input type="hidden"
                   th:name="${_csrf.parameterName}"
                   th:value="${_csrf.token}">

            <input type="text"
                   name="otp"
                   placeholder="Enter OTP"
                   required>

            <input type="password"
                   name="newPassword"
                   placeholder="New Password"
                   required>

            <input type="password"
                   name="confirmPassword"
                   placeholder="Confirm Password"
                   required>

            <button type="submit">
                Reset Password
            </button>

        </form>

    </div>

</body>

</html>
