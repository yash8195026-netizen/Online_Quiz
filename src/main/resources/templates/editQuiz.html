<!DOCTYPE html>

<html xmlns:th="http://www.thymeleaf.org" 
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <title>Edit Quiz</title>
    <link rel="stylesheet" type="text/css" th:href="@{/css/dashboard.css}" />
</head>
<body>

<!-- Navbar -->     
   <nav class="navbar">
    <div class="logo">Online Quiz</div>
    <div class="nav-right">
        <div class="topdiv">
            <a class="topmenu" th:href="@{/home}">Home</a>
            <a class="topmenu" th:href="@{/quiz}">Quiz</a>
            <a class="topmenu" th:href="@{/quizList}" sec:authorize="hasRole('ADMIN')">Manage Quiz </a>
            <a class="topmenu" th:href="@{/profile}" class="topmenu username">Welcome,<span th:text="${#authentication.name}"></span></a>
        </div>
            <form th:action="@{/logout}" method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                <button type="submit" class="logout-btn"> Logout </button>
            </form>
        </div>
    </nav>

    <div class="form-container">
    <h2>Edit Quiz</h2>

        <form th:action="@{/editQuiz}" th:object="${question}" method="post">
            <input type="hidden" name="_method" value="PUT">
            <input type="hidden" th:field="*{id}">

            <textarea th:field="*{questionText}" rows="8" placeholder="Question" required></textarea>
            <input type="text" name="option1" th:value="${question.option1}" placeholder="Option 1" required>
            <input type="text" name="option2" th:value="${question.option2}" placeholder="Option 2" required>
            <input type="text" name="option3" th:value="${question.option3}" placeholder="Option 3" required>
            <input type="text" name="option4" th:value="${question.option4}" placeholder="Option 4" required>

            <input type="text" th:field="*{correctAnswer}" placeholder="Correct Answer" required>
            <button type="submit" class="save-btn"> Update Quiz </button>
        </form>
    </div>
    </body>
</html>
