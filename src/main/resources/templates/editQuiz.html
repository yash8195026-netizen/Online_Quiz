<!DOCTYPE html>

<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
    <title>Edit Quiz</title>

<!-- Dark Mode -->
<script>
    if (localStorage.getItem("theme") === "dark") {
        document.documentElement.classList.add("dark-mode");
    }
</script>

<link rel="stylesheet" th:href="@{/css/base.css}">
<link rel="stylesheet" th:href="@{/css/navbar.css}">
<link rel="stylesheet" th:href="@{/css/forms.css}">
<link rel="stylesheet" th:href="@{/css/darkmode.css}">
<link rel="stylesheet" th:href="@{/css/mobile.css}">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

</head>

<body>

<!-- ================= NAVBAR ================= -->
<div th:replace="~{fragments/navbar :: navbar}"></div>

<!-- ================= EDIT QUIZ FORM ================= -->
<div class="form-container">

    <h2>Edit Quiz</h2>

    <form th:action="@{/editQuiz}"
          th:object="${question}"
          method="post">

        <!-- Method Override -->
        <input type="hidden"
               name="_method"
               value="PUT">

        <!-- Question Id -->
        <input type="hidden"
               th:field="*{id}">

        <!-- Category -->
        <select name="categoryId" required>

            <option th:each="cat : ${categories}"
                    th:value="${cat.id}"
                    th:text="${cat.name}"
                    th:selected="${question.category.id == cat.id}">
            </option>

        </select>

        <!-- Question -->
        <textarea th:field="*{questionText}"
                  rows="8"
                  placeholder="Question"
                  required>
        </textarea>

        <!-- Options -->
        <input type="text"
               name="option1"
               th:value="${question.option1}"
               placeholder="Option 1"
               required>

        <input type="text"
               name="option2"
               th:value="${question.option2}"
               placeholder="Option 2"
               required>

        <input type="text"
               name="option3"
               th:value="${question.option3}"
               placeholder="Option 3"
               required>

        <input type="text"
               name="option4"
               th:value="${question.option4}"
               placeholder="Option 4"
               required>

        <!-- Correct Answer -->
        <input type="text"
               th:field="*{correctAnswer}"
               placeholder="Correct Answer"
               required>

        <!-- Submit -->
        <button type="submit"
                class="save-btn">

            Update Quiz

        </button>

    </form>

</div>

<!-- Theme Script -->
<script th:src="@{/js/theme.js}"></script>

</body>
</html>
