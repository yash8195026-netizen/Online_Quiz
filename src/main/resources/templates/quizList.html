<!DOCTYPE html>

<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
    <title>Manage Quiz Questions</title>
    
<!-- Dark Mode -->
<script>
    if (localStorage.getItem("theme") === "dark") {
        document.documentElement.classList.add("dark-mode");
    }
</script>

<link rel="stylesheet" th:href="@{/css/base.css}">
<link rel="stylesheet" th:href="@{/css/navbar.css}">
<link rel="stylesheet" th:href="@{/css/forms.css}">
<link rel="stylesheet" th:href="@{/css/darkmode.css}">
<link rel="stylesheet" th:href="@{/css/mobile.css}">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

</head>

<body>

<!-- ================= NAVBAR ================= -->
<div th:replace="~{fragments/navbar :: navbar}"></div>

<!-- ================= PAGE CONTENT ================= -->
<div class="container">

    <!-- Page Header -->
    <div class="page-header">

        <h2>Quiz Questions</h2>

        <a th:href="@{/addQuiz}"
           class="add-btn">

            + Add New Quiz

        </a>

    </div>

    <!-- ================= TABLE ================= -->
    <div class="table-container">

        <table>

            <thead>
                <tr>
                    <th>#</th>
                    <th>Question</th>
                    <th>Answer</th>
                    <th>Actions</th>
                </tr>
            </thead>

            <tbody>

                <!-- Quiz Questions -->
                <tr th:each="q, stat : ${questions}">

                    <td th:text="'Q' + ${stat.count}"></td>

                    <td th:text="${q.questionText}"></td>

                    <td th:text="${q.correctAnswer}"></td>

                    <td class="actions">

                        <!-- Edit -->
                        <a class="edit-btn"
                           th:href="@{/editQuiz/{id}(id=${q.id})}">

                            Edit

                        </a>

                        <!-- Delete -->
                        <form th:action="@{/deleteQuiz/{id}(id=${q.id})}"
                              method="post">

                            <input type="hidden"
                                   th:name="${_csrf.parameterName}"
                                   th:value="${_csrf.token}" />

                            <input type="hidden"
                                   name="_method"
                                   value="DELETE">

                            <button class="delete-btn"
                                    type="submit"
                                    onclick="return confirm('Delete this quiz?')">

                                Delete

                            </button>

                        </form>

                    </td>

                </tr>

                <!-- Empty State -->
                <tr th:if="${#lists.isEmpty(questions)}">

                    <td colspan="4"
                        class="empty-message">

                        No quiz questions found.

                    </td>

                </tr>

            </tbody>

        </table>

        <!-- ================= PAGINATION ================= -->
        <div class="pagination"
             th:if="${totalPages > 1}">

            <!-- Previous -->
            <a th:if="${currentPage > 0}"
               th:href="${category != null}
                    ? @{/quizList/{category}(category=${category},page=${currentPage - 1})}
                    : @{/quizList(page=${currentPage - 1})}">

                Previous

            </a>

            <!-- Page Numbers -->
            <span th:each="i : ${#numbers.sequence(0,totalPages-1)}">

                <a th:href="${category != null}
                        ? @{/quizList/{category}(category=${category},page=${i})}
                        : @{/quizList(page=${i})}"

                   th:text="${i + 1}"

                   th:classappend="${i == currentPage}
                        ? 'active-page'
                        : ''">

                </a>

            </span>

            <!-- Next -->
            <a th:if="${currentPage < totalPages - 1}"
               th:href="${category != null}
                    ? @{/quizList/{category}(category=${category},page=${currentPage + 1})}
                    : @{/quizList(page=${currentPage + 1})}">

                Next

            </a>

        </div>

        <br><br>

    </div>

</div>

<!-- Theme Script -->
<script th:src="@{/js/theme.js}"></script>

</body>
</html>
